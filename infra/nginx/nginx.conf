worker_processes auto;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 25m;
    proxy_read_timeout 300s;

    # 127.0.0.11 is Docker Compose's embedded DNS server. Using it with a
    # short TTL + a variable in proxy_pass (rather than a bare hostname)
    # forces nginx to re-resolve api/web on every request instead of caching
    # whatever IP they had at nginx's own startup. Without this, redeploying
    # api or web (`docker compose up -d --build api`) recreates the
    # container with a new IP and nginx keeps proxying to the dead one --
    # every request 502s until nginx itself is restarted. Hit exactly this
    # during initial deployment.
    resolver 127.0.0.11 valid=10s;

    # SUMO scenario runs can take a while; give the API generous headroom.
    server {
        listen 80;

        location /api/ {
            set $upstream_api http://api:8000;
            proxy_pass $upstream_api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            set $upstream_api http://api:8000;
            proxy_pass $upstream_api/health;
        }

        location / {
            set $upstream_web http://web:3000;
            proxy_pass $upstream_web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js dev/HMR + server actions expect upgrade support even
            # when not strictly websockets; harmless to keep for prod too.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
