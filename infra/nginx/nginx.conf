worker_processes auto;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 25m;
    proxy_read_timeout 300s;

    # 127.0.0.11 is Docker Compose's embedded DNS server. Putting the
    # hostname in a variable forces nginx to re-resolve it per request
    # (honoring the resolver's TTL) instead of caching whatever IP it had
    # at nginx's own startup. Without this, redeploying api or web
    # (`docker compose up -d --build api`) recreates the container with a
    # new IP and nginx keeps proxying to the dead one -- every request
    # 502s until nginx itself is restarted. Hit exactly this on the first
    # redeploy.
    #
    # IMPORTANT: once proxy_pass's target depends on a variable, nginx
    # stops doing its usual "replace the matched location prefix, keep the
    # rest of the URI" splicing -- it needs the URI spelled out explicitly,
    # or every request collapses to whatever fixed path is in proxy_pass
    # (e.g. every /api/* request silently becoming a request for bare
    # /api/, 404ing). Also hit this immediately after the fix above.
    # $request_uri (original path + query string, unmodified) is what we
    # want here since these locations are pure passthroughs with no
    # rewriting.
    resolver 127.0.0.11 valid=10s;

    # SUMO scenario runs can take a while; give the API generous headroom.
    server {
        listen 80;

        location /api/ {
            set $upstream_api api;
            proxy_pass http://$upstream_api:8000$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            set $upstream_api api;
            proxy_pass http://$upstream_api:8000$request_uri;
        }

        location / {
            set $upstream_web web;
            proxy_pass http://$upstream_web:3000$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js dev/HMR + server actions expect upgrade support even
            # when not strictly websockets; harmless to keep for prod too.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
