[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is intentionally omitted here -- app/db/migrations/env.py
# loads it from app.core.config.get_settings() (which reads .env) so there
# is a single source of truth for the DB connection string.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
